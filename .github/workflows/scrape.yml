# Scrape Asker Plan og bygg postliste on a schedule or via manual trigger.
# Smart stop and headless mode keep runs short when there's no new data.

name: Scrape Asker Plan og bygg

on:
  schedule:
    # Every hour, on the hour (e.g. 00:00, 01:00, 02:00 UTC)
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Install Playwright and Chromium
        run: python -m playwright install chromium

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          # Backend reads SUPABASE_SERVICE_KEY; store value in secret SUPABASE_SERVICE_ROLE_KEY
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python backend/scraper.py
